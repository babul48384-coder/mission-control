<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control - OpenClaw Agent Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0b;
            color: #fafafa;
            min-height: 100vh;
            padding: 24px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #3b82f6, #a855f7); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; }
        .logo h1 { font-size: 1.5rem; font-weight: 600; }
        .last-updated { color: #71717a; font-size: 0.875rem; }
        
        .stats-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-pill { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: #1a1a1d; border: 1px solid #27272a; border-radius: 20px; font-size: 0.875rem; }
        .stat-pill .num { font-weight: 600; }
        .stat-pill .label { color: #71717a; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-bottom: 24px; }
        .card { background: #1a1a1d; border: 1px solid #27272a; border-radius: 12px; padding: 24px; }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .card-header h2 { font-size: 1rem; font-weight: 600; color: #a1a1aa; }
        
        .agent-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .agent-card { background: #18181b; border-radius: 10px; padding: 16px; border: 1px solid transparent; transition: all 0.2s; }
        .agent-card:hover { background: #222225; border-color: #3f3f46; }
        .agent-name { font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .agent-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; margin-bottom: 8px; }
        .agent-status.active { background: rgba(34,197,94,0.15); color: #22c55e; }
        .agent-status.idle { background: rgba(234,179,8,0.15); color: #eab308; }
        .agent-status .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .agent-task { font-size: 0.75rem; color: #a1a1aa; }
        .agent-learning { font-size: 0.7rem; color: #3b82f6; margin-top: 4px; }
        
        .activity-list { display: flex; flex-direction: column; gap: 2px; }
        .activity-item { display: flex; gap: 12px; padding: 10px 12px; border-radius: 6px; }
        .activity-item:hover { background: #18181b; }
        .activity-time { font-size: 0.75rem; color: #71717a; min-width: 50px; }
        .activity-event { font-size: 0.875rem; color: #a1a1aa; }
        
        .loading { text-align: center; padding: 40px; color: #71717a; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">馃殌</div>
                <h1>Mission Control</h1>
            </div>
            <div class="last-updated" id="last-updated">Loading...</div>
        </header>

        <div class="stats-row" id="stats-row"></div>

        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <span>馃</span>
                    <h2>Agent 鐘舵€?/h2>
                </div>
                <div class="agent-list" id="agent-list">
                    <div class="loading">Loading...</div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span>馃搵</span>
                    <h2>鏈€杩戞椿鍔?/h2>
                </div>
                <div class="activity-list" id="activity-list">
                    <div class="loading">Loading...</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span>馃搳</span>
                <h2>绯荤粺鐘舵€?/h2>
            </div>
            <div class="agent-list">
                <div class="agent-card">
                    <div class="agent-name">馃寪 Gateway</div>
                    <div class="agent-status active"><span class="dot"></span> Running</div>
                </div>
                <div class="agent-card">
                    <div class="agent-name">馃摫 Feishu</div>
                    <div class="agent-status active"><span class="dot"></span> 10/10 Connected</div>
                </div>
                <div class="agent-card">
                    <div class="agent-name">馃惓 Coze</div>
                    <div class="agent-status active"><span class="dot"></span> Running</div>
                </div>
                <div class="agent-card">
                    <div class="agent-name">馃摟 Mailboxes</div>
                    <div class="agent-status active"><span class="dot"></span> Active</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DATA_URL = './data/dashboard-data.json';
        let lastUpdateTime = null;

        function updateTime() {
            if (!lastUpdateTime) return;
            const now = new Date();
            const diff = Math.floor((now - lastUpdateTime) / 1000);
            let text = diff < 60 ? `${diff}s ago` : `${Math.floor(diff / 60)}m ago`;
            document.getElementById('last-updated').textContent = `Updated ${text}`;
        }

        async function fetchData() {
            try {
                const response = await fetch(DATA_URL + '?_=' + Date.now());
                const data = await response.json();
                lastUpdateTime = new Date(data.lastUpdated);
                renderDashboard(data);
            } catch (err) {
                console.error('Failed to fetch:', err);
            }
        }

        function renderDashboard(data) {
            // Stats
            const statsRow = document.getElementById('stats-row');
            statsRow.innerHTML = `
                <div class="stat-pill"><span class="num">${data.agents?.length || 10}</span><span class="label">Agents</span></div>
                <div class="stat-pill"><span class="num">${data.activeAgents || 0}</span><span class="label">Active</span></div>
                <div class="stat-pill"><span class="num">${data.skillsReady || 979}</span><span class="label">Skills</span></div>
            `;

            // Agents
            const agentList = document.getElementById('agent-list');
            if (data.agents && data.agents.length > 0) {
                agentList.innerHTML = data.agents.map(a => `
                    <div class="agent-card">
                        <div class="agent-name">${a.emoji || '馃'} ${a.name}</div>
                        <div class="agent-status ${a.status}"><span class="dot"></span> ${a.status}</div>
                        ${a.currentTask ? `<div class="agent-task">${a.currentTask}</div>` : ''}
                        ${a.learning ? '<div class="agent-learning">馃摎 Learning</div>' : ''}
                    </div>
                `).join('');
            }

            // Activity
            const activityList = document.getElementById('activity-list');
            if (data.recentActivity && data.recentActivity.length > 0) {
                activityList.innerHTML = data.recentActivity.slice(0, 8).map(a => {
                    const t = new Date(a.time);
                    return `<div class="activity-item"><div class="activity-time">${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}</div><div class="activity-event">${a.event}</div></div>`;
                }).join('');
            }
        }

        // Initialize
        fetchData();
        setInterval(updateTime, 1000);
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
